<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SexyRPG Full Version</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.js"></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #222; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            touch-action: none; /* 重要：防止行動端捲動與觸控衝突 */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #gameCanvas { 
            margin-top: 10px; 
            border: 2px solid #555; 
            /* 建議加上這行，確保 Canvas 在手機上能正確填滿 */
            touch-action: none; 
        }
        #zone_joystick { 
            width: 150px; 
            height: 150px; 
            margin-top: 20px; 
            background: #444; 
            border-radius: 50%; 
            position: relative; /* 確保搖桿定位正確 */
        }
    </style>
</head>
<body>
    <div id="gameCanvas"></div>
    <div id="zone_joystick"></div>
    
    <script src="game.js"></script>
</body>
</html>
